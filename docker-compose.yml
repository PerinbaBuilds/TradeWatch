# TradeWatch — local stacks.
#
#   Default (built-in simulator):
#     docker compose up --build            → http://localhost:8000
#
#   Full Kafka → FastAPI pipeline (broker + producer + consumer):
#     docker compose --profile kafka up --build   → http://localhost:8000
#
services:
  # --- Default: TradeWatch with the built-in simulator ---------------------
  tradewatch:
    build: .
    image: tradewatch:latest
    ports:
      - "8000:8000"
    environment:
      TRADEWATCH_SOURCE: "simulator"
      TRADEWATCH_SIMULATOR_TRADES_PER_SECOND: "25"
      TRADEWATCH_SIMULATOR_ANOMALY_RATE: "0.015"
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped

  # --- Kafka broker (KRaft mode, no ZooKeeper) -----------------------------
  kafka:
    image: apache/kafka:3.7.0
    profiles: ["kafka"]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- TradeWatch consuming from Kafka -------------------------------------
  tradewatch-kafka:
    build: .
    image: tradewatch:latest
    profiles: ["kafka"]
    ports:
      - "8000:8000"
    environment:
      TRADEWATCH_SOURCE: "kafka"
      TRADEWATCH_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      TRADEWATCH_KAFKA_TOPIC: "trades"
      TRADEWATCH_KAFKA_AUTO_OFFSET_RESET: "earliest"
    volumes:
      - ./config:/app/config:ro
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # --- Producer: publishes the simulated tape into Kafka -------------------
  producer:
    build: .
    image: tradewatch:latest
    profiles: ["kafka"]
    command: ["python", "examples/kafka_producer.py", "--bootstrap", "kafka:9092", "--topic", "trades", "--tps", "25"]
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
