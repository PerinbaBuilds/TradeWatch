name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests spark hadoop examples scripts

      - name: Test
        run: pytest -q

      - name: Detection quality gate (precision/recall)
        run: tradewatch evaluate --trades 12000 --seed 7

      - name: Latency benchmark (sub-200ms gate)
        run: tradewatch bench --trades 8000

  bigdata:
    name: Big-data smoke (Spark + Hadoop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Java (for Spark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install with Spark extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[spark]"

      - name: Generate sample data
        run: |
          python examples/generate_history.py --out data/trades.parquet --format parquet --trades 6000 --seed 7
          python examples/generate_history.py --out data/trades.jsonl --format json --trades 6000 --seed 7

      - name: Spark batch backtest
        run: python spark/batch_backtest.py --input data/trades.parquet

      - name: Hadoop MapReduce (Streaming, local)
        run: |
          echo "flagged anomalies:"
          bash hadoop/run_local.sh data/trades.jsonl | tee /tmp/mr.tsv | head -20
          test "$(wc -l < /tmp/mr.tsv)" -gt 0

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t tradewatch:ci .
